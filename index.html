<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Finance Control</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💵</text></svg>">
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <span class="brand-mark">💵</span>
        <span class="brand-name">Finance Control</span>
      </div>
      <nav id="nav">
        <a href="#dashboard" data-view="dashboard"><span class="nav-ico">◧</span> Dashboard</a>
        <a href="#bills" data-view="bills"><span class="nav-ico">▤</span> Bills <span class="nav-badge" id="bills-badge" hidden></span></a>
        <a href="#calendar" data-view="calendar"><span class="nav-ico">▣</span> Calendar</a>
        <a href="#accounts" data-view="accounts"><span class="nav-ico">▦</span> Accounts</a>
        <a href="#budget" data-view="budget"><span class="nav-ico">◫</span> Budget &amp; Forecast</a>
        <a href="#networth" data-view="networth"><span class="nav-ico">◩</span> Net Worth</a>
        <a href="#payoff" data-view="payoff"><span class="nav-ico">◨</span> Debt Payoff</a>
        <a href="#cards" data-view="cards"><span class="nav-ico">▥</span> Card Paydown <span class="nav-badge" id="cards-badge" hidden></span></a>
        <a href="#import" data-view="import"><span class="nav-ico">⇪</span> Import Statement</a>
      </nav>
      <div class="sidebar-foot">
        <div class="save-status" id="save-status">All changes saved locally</div>
        <div class="foot-actions">
          <button class="btn btn-ghost btn-sm" id="btn-export">Export backup</button>
          <button class="btn btn-ghost btn-sm" id="btn-import-backup">Restore</button>
        </div>
      </div>
    </aside>
    <main id="main" class="main"></main>
  </div>
  <div id="modal-root"></div>
  <div id="toast-root"></div>
  <input type="file" id="backup-file-input" accept=".json" hidden>
  <script src="cloud.js"></script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
